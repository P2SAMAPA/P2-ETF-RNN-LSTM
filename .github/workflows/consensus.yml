name: Consensus Sweep

on:
  # ── Scheduled: daily at 9:30 PM EST (1 AM UTC next day, weekdays only) ────────
  schedule:
    - cron: "30 2 * * 2-6"   # Tue–Sat 01:00 UTC = Mon–Fri 8:00 PM EST

  # ── Manual trigger from GitHub Actions UI ──────────────────────────────────
  workflow_dispatch:
    inputs:
      years:
        description: "Training-start years (space-separated, e.g. '2015 2016 2017'). Leave blank for full 2008–2024 sweep."
        required: false
        default: ""
      workers:
        description: "Parallel threads (default: 4)"
        required: false
        default: "4"

jobs:
  consensus:
    name: "Run Consensus Sweep"
    runs-on: ubuntu-latest
    timeout-minutes: 120       # 2-hour hard cap

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run sweep ──────────────────────────────────────────────────────────
      - name: Run consensus sweep
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Build args — use manual inputs if provided, else defaults
          EXTRA_ARGS=""

          if [ -n "${{ github.event.inputs.years }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --years ${{ github.event.inputs.years }}"
          fi

          if [ -n "${{ github.event.inputs.workers }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --workers ${{ github.event.inputs.workers }}"
          fi

          echo "Running: python consensus_train.py $EXTRA_ARGS"
          python consensus_train.py $EXTRA_ARGS

      # ── 5. Upload logs as artifact (always, even on failure) ─────────────────
      - name: Upload training logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consensus-logs-${{ github.run_id }}
          path: logs/consensus.log
          retention-days: 7
